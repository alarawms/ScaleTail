configs:
  ts-serve:
    content: |
      {"TCP":{"443":{"HTTPS":true}},
      "Web":{"$${TS_CERT_DOMAIN}:443":
          {"Handlers":{"/":
          {"Proxy":"http://127.0.0.1:5000"}}}},
      "AllowFunnel":{"$${TS_CERT_DOMAIN}:443":false}}

services:
# Make sure you have updated/checked the .env file with the correct variables. 
# All the ${ xx } need to be defined there.
  # Tailscale Sidecar Configuration
  tailscale:
    image: tailscale/tailscale:latest # Image to be used
    container_name: tailscale-grampsweb  # Name for local container management
    hostname: grampsweb  # Name used within your Tailscale environment
    environment:
    - TS_AUTHKEY=${TS_AUTHKEY}
    - TS_STATE_DIR=/var/lib/tailscale
    - TS_SERVE_CONFIG=/config/serve.json   # Tailscale Serve configuration to expose the web interface on your local Tailnet - remove this line if not required
    - TS_USERSPACE=true
    - TS_ENABLE_HEALTH_CHECK=true                # Enable healthcheck endpoint: "/healthz"
    - TS_LOCAL_ADDR_PORT=127.0.0.1:41234         # The <addr>:<port> for the healthz endpoint
      #- TS_ACCEPT_DNS=true # Uncomment when using MagicDNS
    - TS_AUTH_ONCE=true
    configs:
    - source: ts-serve
      target: /config/serve.json
    volumes:
    - ${DATA_ROOT:-/volume1/docker}/grampsweb/config:/config # Config folder used to store Tailscale files - you may need to change the path
    - ${DATA_ROOT:-/volume1/docker}/grampsweb/ts/state:/var/lib/tailscale # Tailscale requirement - you may need to change the path
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://127.0.0.1:41234/healthz"] # Check Tailscale has a Tailnet IP and is operational
      interval: 1m # How often to perform the check
      timeout: 10s # Time to wait for the check to succeed
      retries: 3 # Number of retries before marking as unhealthy
      start_period: 10s # Time to wait before starting health checks
    restart: always

  # ${SERVICE}
  application: &grampsweb
    image: ghcr.io/gramps-project/grampsweb # Image to be used
    network_mode: service:tailscale # Sidecar configuration to route ${SERVICE} through Tailscale
    container_name: app-grampsweb  # Name for local container management
    environment:
      PUID: ${PUID:-1026}
      PGID: ${PGID:-100}
      TZ: ${TZ:-UTC}
      GRAMPSWEB_TREE: "Gramps Web"  # will create a new tree if not exists
      GRAMPSWEB_CELERY_CONFIG__broker_url: "redis://grampsweb_redis:6379/0"
      GRAMPSWEB_CELERY_CONFIG__result_backend: "redis://grampsweb_redis:6379/0"
      GRAMPSWEB_RATELIMIT_STORAGE_URI: redis://grampsweb_redis:6379/1
    volumes:
    - ${DATA_ROOT:-/volume1/docker}/grampsweb/grampsweb-data/gramps_users:/app/users # persist user database
    - ${DATA_ROOT:-/volume1/docker}/grampsweb/grampsweb-data/gramps_index:/app/indexdir # persist search index
    - ${DATA_ROOT:-/volume1/docker}/grampsweb/grampsweb-data/gramps_thumb_cache:/app/thumbnail_cache # persist thumbnails
    - ${DATA_ROOT:-/volume1/docker}/grampsweb/grampsweb-data/gramps_cache:/app/cache # persist export and report caches
    - ${DATA_ROOT:-/volume1/docker}/grampsweb/grampsweb-data/gramps_secret:/app/secret # persist flask secret
    - ${DATA_ROOT:-/volume1/docker}/grampsweb/grampsweb-data/gramps_db:/root/.gramps/grampsdb # persist Gramps database
    - ${DATA_ROOT:-/volume1/docker}/grampsweb/grampsweb-data/gramps_media:/app/media # persist media files
    - ${DATA_ROOT:-/volume1/docker}/grampsweb/grampsweb-data/gramps_tmp:/tmp
    depends_on:
      tailscale:
        condition: service_healthy
      grampsweb_redis:
        condition: service_healthy
    restart: always

    labels:
    - com.portainer.stack=grampsweb
    - com.portainer.category=scaletail
  grampsweb_celery:
    <<: *grampsweb
                    # YAML merge key copying the entire grampsweb service config
    ports: []
    container_name: app-grampsweb-celery
    depends_on:
    - grampsweb_redis
    command: celery -A gramps_webapi.celery worker --loglevel=INFO --concurrency=2

    image: ghcr.io/gramps-project/grampsweb
  grampsweb_redis:
    image: docker.io/library/redis:7.2.4-alpine
    container_name: app-grampsweb-redis
    healthcheck:
      test: ["CMD", "redis-cli", "ping"] # Check if ${SERVICE} process is running
      interval: 1m # How often to perform the check
      timeout: 10s # Time to wait for the check to succeed
      retries: 3 # Number of retries before marking as unhealthy
      start_period: 30s # Time to wait before starting health checks
    restart: always
    labels:
    - com.portainer.stack=grampsweb
    - com.portainer.category=scaletail
