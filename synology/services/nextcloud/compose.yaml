configs:
  ts-serve:
    content: |
      {"TCP":{"443":{"HTTPS":true}},
      "Web":{"$${TS_CERT_DOMAIN}:443":
          {"Handlers":{"/":
          {"Proxy":"http://127.0.0.1:80"}}}},
      "AllowFunnel":{"$${TS_CERT_DOMAIN}:443":false}}

services:
# Make sure you have updated/checked the .env file with the correct variables. 
# All the ${ xx } need to be defined there.
  # Tailscale Sidecar Configuration
  tailscale:
    image: tailscale/tailscale:latest # Image to be used
    container_name: tailscale-nextcloud  # Name for local container management
    hostname: nextcloud  # Name used within your Tailscale environment
    environment:
    - TS_AUTHKEY=${TS_AUTHKEY}
    - TS_STATE_DIR=/var/lib/tailscale
    - TS_SERVE_CONFIG=/config/serve.json   # Tailscale Serve configuration to expose the web interface on your local Tailnet - remove this line if not required
    - TS_USERSPACE=true
    - TS_ENABLE_HEALTH_CHECK=true                # Enable healthcheck endpoint: "/healthz"
    - TS_LOCAL_ADDR_PORT=127.0.0.1:41234         # The <addr>:<port> for the healthz endpoint
      #- TS_ACCEPT_DNS=true # Uncomment when using MagicDNS
    - TS_AUTH_ONCE=true
    configs:
    - source: ts-serve
      target: /config/serve.json
    volumes:
    - ${DATA_ROOT:-/volume1/docker}/nextcloud/config:/config # Config folder used to store Tailscale files - you may need to change the path
    - ${DATA_ROOT:-/volume1/docker}/nextcloud/ts/state:/var/lib/tailscale # Tailscale requirement - you may need to change the path
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://127.0.0.1:41234/healthz"] # Check Tailscale has a Tailnet IP and is operational
      interval: 1m # How often to perform the check
      timeout: 10s # Time to wait for the check to succeed
      retries: 3 # Number of retries before marking as unhealthy
      start_period: 10s # Time to wait before starting health checks
    restart: always

  # ${SERVICE}
  application:
    image: nextcloud    # Image to be used
    network_mode: service:tailscale # Sidecar configuration to route ${SERVICE} through Tailscale
    container_name: app-nextcloud  # Name for local container management
    environment:
    - MYSQL_PASSWORD=${MYSQL_PASSWORD}
    - MYSQL_DATABASE=nextcloud
    - MYSQL_USER=nextcloud
    - MYSQL_HOST=db   # Please note, this variable should reflect the service name of the database itself, in this case db
    - TZ=${TZ:-UTC}
    volumes:
    - ${DATA_ROOT:-/volume1/docker}/nextcloud/nextcloud-data/nextcloud_data/:/var/www/html
    depends_on:
      tailscale:
        condition: service_healthy
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "pgrep", "-f", "apache2"] # Check if ${SERVICE} process is running
      interval: 1m # How often to perform the check
      timeout: 10s # Time to wait for the check to succeed
      retries: 3 # Number of retries before marking as unhealthy
      start_period: 30s # Time to wait before starting health checks
    restart: always

  # MariaDB used by NextCloud
    labels:
    - com.portainer.stack=nextcloud
    - com.portainer.category=scaletail
  db:
    image: mariadb:latest # Image to be used
    container_name: nextcloud_db # Name for local container management
    environment:
    - MYSQL_ROOT_PASSWORD=${MYSQL_ROOT_PASSWORD}
    - MYSQL_PASSWORD=${MYSQL_PASSWORD}
    - MYSQL_DATABASE=nextcloud
    - MYSQL_USER=nextcloud
    volumes:
    - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "pgrep", "mariadbd"] # Check if MariaDB is running
      interval: 1m # How often to perform the check
      timeout: 10s # Time to wait for the check to succeed
      retries: 3 # Number of retries before marking as unhealthy
      start_period: 30s # Time to wait before starting health checks
    restart: always

    labels:
    - com.portainer.stack=nextcloud
    - com.portainer.category=scaletail
volumes:
  nextcloud_data:
  db_data:
