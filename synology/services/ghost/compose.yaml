configs:
  ts-serve:
    content: |
      {"TCP":{"443":{"HTTPS":true}},
      "Web":{"$${TS_CERT_DOMAIN}:443":
          {"Handlers":{"/":
          {"Proxy":"http://127.0.0.1:80"}}}},
      "AllowFunnel":{"$${TS_CERT_DOMAIN}:443":false}}

services:
# Make sure you have updated/checked the .env file with the correct variables. 
# All the ${ xx } need to be defined there.
  # Tailscale Sidecar Configuration
  tailscale:
    image: tailscale/tailscale:latest # Image to be used
    container_name: tailscale-ghost      # Name for local container management
    hostname: ghost      # Name used within your Tailscale environment
    environment:
    - TS_AUTHKEY=${TS_AUTHKEY}
    - TS_STATE_DIR=/var/lib/tailscale
    - TS_SERVE_CONFIG=/config/serve.json   # Tailscale Serve configuration to expose the web interface on your local Tailnet - remove this line if not required
    - TS_USERSPACE=true
    - TS_ENABLE_HEALTH_CHECK=true                # Enable healthcheck endpoint: "/healthz"
    - TS_LOCAL_ADDR_PORT=127.0.0.1:41234         # The <addr>:<port> for the healthz endpoint
      #- TS_ACCEPT_DNS=true # Uncomment when using MagicDNS
    - TS_AUTH_ONCE=true
    configs:
    - source: ts-serve
      target: /config/serve.json
    volumes:
    - ${DATA_ROOT:-/volume1/docker}/ghost/config:/config # Config folder used to store Tailscale files - you may need to change the path
    - ${DATA_ROOT:-/volume1/docker}/ghost/ts/state:/var/lib/tailscale # Tailscale requirement - you may need to change the path
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://127.0.0.1:41234/healthz"] # Check Tailscale has a Tailnet IP and is operational
      interval: 1m # How often to perform the check
      timeout: 10s # Time to wait for the check to succeed
      retries: 3 # Number of retries before marking as unhealthy
      start_period: 10s # Time to wait before starting health checks
    restart: always

  # ${SERVICE}
  application:
    image: ghost:5-alpine # Image to be used
    network_mode: service:tailscale # Sidecar configuration to route ${SERVICE} through Tailscale
    container_name: app-ghost      # Name for local container management
    environment:
      # see https://ghost.org/docs/config/#configuration-options
      database__client: mysql
      database__connection__host: db
      database__connection__user: root
      database__connection__password: example
      database__connection__database: ghost

      # this url value is just an example, and is likely wrong for your environment!
      url: http://localhost:8080

      # contrary to the default mentioned in the linked documentation, this image defaults to NODE_ENV=production (so development mode needs to be explicitly specified if desired)
      #NODE_ENV: development
    volumes:
    - ${DATA_ROOT:-/volume1/docker}/ghost/ghost-data/app/config:/config
    - ${DATA_ROOT:-/volume1/docker}/ghost/ghost-data/ghost:/var/lib/ghost/content
    depends_on:
      tailscale:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "pgrep", "-f", "node"] # Check if ${SERVICE} process is running
      interval: 1m # How often to perform the check
      timeout: 10s # Time to wait for the check to succeed
      retries: 3 # Number of retries before marking as unhealthy
      start_period: 30s # Time to wait before starting health checks
    restart: always

    labels:
    - com.portainer.stack=ghost
    - com.portainer.category=scaletail
  db:
    image: mysql:8.0
    container_name: db-ghost      # Name for local container management
    environment:
      MYSQL_ROOT_PASSWORD: example
    volumes:
    - ${DATA_ROOT:-/volume1/docker}/ghost/ghost-data/db:/var/lib/mysql
    restart: always
    labels:
    - com.portainer.stack=ghost
    - com.portainer.category=scaletail
