configs:
  ts-serve:
    content: |
      {"TCP":{"443":{"HTTPS":true}},
      "Web":{"$${TS_CERT_DOMAIN}:443":
          {"Handlers":{"/":
          {"Proxy":"http://127.0.0.1:3000"}}}},
      "AllowFunnel":{"$${TS_CERT_DOMAIN}:443":false}}

services:
# Make sure you have updated/checked the .env file with the correct variables. 
# All the ${ xx } need to be defined there.
  # Tailscale Sidecar Configuration
  tailscale:
    image: tailscale/tailscale:latest # Image to be used
    container_name: tailscale-docmost    # Name for local container management
    hostname: docmost    # Name used within your Tailscale environment
    environment:
    - TS_AUTHKEY=${TS_AUTHKEY}
    - TS_STATE_DIR=/var/lib/tailscale
    - TS_SERVE_CONFIG=/config/serve.json   # Tailscale Serve configuration to expose the web interface on your local Tailnet - remove this line if not required
    - TS_USERSPACE=true
    - TS_ENABLE_HEALTH_CHECK=true                # Enable healthcheck endpoint: "/healthz"
    - TS_LOCAL_ADDR_PORT=127.0.0.1:41234         # The <addr>:<port> for the healthz endpoint
      #- TS_ACCEPT_DNS=true # Uncomment when using MagicDNS
    - TS_AUTH_ONCE=true
    configs:
    - source: ts-serve
      target: /config/serve.json
    volumes:
    - ${DATA_ROOT:-/volume1/docker}/docmost/config:/config # Config folder used to store Tailscale files - you may need to change the path
    - ${DATA_ROOT:-/volume1/docker}/docmost/ts/state:/var/lib/tailscale # Tailscale requirement - you may need to change the path
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://127.0.0.1:41234/healthz"] # Check Tailscale has a Tailnet IP and is operational
      interval: 1m # How often to perform the check
      timeout: 10s # Time to wait for the check to succeed
      retries: 3 # Number of retries before marking as unhealthy
      start_period: 10s # Time to wait before starting health checks
    restart: always

  # ${SERVICE}
  application:
    image: docmost/docmost # Image to be used
    network_mode: service:tailscale # Sidecar configuration to route ${SERVICE} through Tailscale
    container_name: app-docmost    # Name for local container management
    environment:
      APP_URL: 'http://localhost:3000'
      APP_SECRET: 'REPLACE_WITH_LONG_SECRET' # Please replace with a long secret
      DATABASE_URL: 'postgresql://docmost:STRONG_DB_PASSWORD@localhost:5432/docmost?schema=public'
      REDIS_URL: 'redis://localhost:6379'
    volumes:
    - ${DATA_ROOT:-/volume1/docker}/docmost/docmost-data/docmost:/app/data/storage
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      tailscale:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "pgrep", "-f", "docmost"]    # Check if ${SERVICE} process is running
      interval: 1m # How often to perform the check
      timeout: 10s # Time to wait for the check to succeed
      retries: 3 # Number of retries before marking as unhealthy
      start_period: 30s # Time to wait before starting health checks
    restart: always

    labels:
    - com.portainer.stack=docmost
    - com.portainer.category=scaletail
  db:
    image: postgres:16-alpine
    network_mode: service:tailscale # Sidecar configuration to route ${SERVICE} through Tailscale
    container_name: app-docmost-database    # Name for local container management
    environment:
      POSTGRES_DB: docmost
      POSTGRES_USER: docmost
      POSTGRES_PASSWORD: STRONG_DB_PASSWORD
    restart: always
    volumes:
    - ${DATA_ROOT:-/volume1/docker}/docmost/docmost-data/db-data:/var/lib/postgresql/data

    labels:
    - com.portainer.stack=docmost
    - com.portainer.category=scaletail
  redis:
    image: redis:7.2-alpine
    network_mode: service:tailscale # Sidecar configuration to route ${SERVICE} through Tailscale
    container_name: app-docmost-redis    # Name for local container management
    restart: always
    volumes:
    - ${DATA_ROOT:-/volume1/docker}/docmost/docmost-data/redis-data:/data
    labels:
    - com.portainer.stack=docmost
    - com.portainer.category=scaletail
