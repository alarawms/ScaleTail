---
name: Synology Validation

on:
  push:
    branches:
      - main
    paths:
      - "services/**"
      - "tools/**"
      - "synology/**"
  pull_request:
    branches:
      - main
    paths:
      - "services/**"
      - "tools/**"
      - "synology/**"
  workflow_dispatch:

jobs:
  generate-and-validate:
    name: Generate & Validate (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ruamel.yaml yamllint

      # ---------------------------------------------------------------
      # Generation
      # ---------------------------------------------------------------
      - name: Run generator
        run: python tools/generate.py --all --verbose --portainer

      - name: Verify synology output exists
        run: |
          if [ ! -d "synology/services" ]; then
            echo "FAIL: synology/services/ directory was not created"
            exit 1
          fi

          FILE_COUNT=$(find synology/services -name 'compose.yaml' | wc -l)
          echo "Found $FILE_COUNT generated compose files"

          if [ "$FILE_COUNT" -eq 0 ]; then
            echo "FAIL: No compose.yaml files found in synology/services/"
            exit 1
          fi

      # ---------------------------------------------------------------
      # Grep-based assertions on generated output
      # ---------------------------------------------------------------
      - name: Assert no /dev/net/tun devices
        run: |
          if grep -r '/dev/net/tun' synology/services/; then
            echo "FAIL: /dev/net/tun found in generated output (devices should be stripped)"
            exit 1
          fi
          echo "PASS: No /dev/net/tun references found"

      - name: Assert no cap_add with net_admin
        run: |
          if grep -r 'net_admin' synology/services/; then
            echo "FAIL: net_admin capability found in generated output (capabilities should be stripped)"
            exit 1
          fi
          echo "PASS: No net_admin capabilities found"

      - name: Assert TS_USERSPACE=true in every compose.yaml
        run: |
          FAIL=0
          for f in $(find synology/services -name 'compose.yaml'); do
            if ! grep -q 'TS_USERSPACE=true' "$f"; then
              echo "FAIL: TS_USERSPACE=true missing in $f"
              FAIL=1
            fi
          done

          if [ "$FAIL" -eq 1 ]; then
            exit 1
          fi
          echo "PASS: TS_USERSPACE=true present in all compose files"

      - name: Assert no TS_USERSPACE=false
        run: |
          if grep -r 'TS_USERSPACE=false' synology/services/; then
            echo "FAIL: TS_USERSPACE=false found in generated output"
            exit 1
          fi
          echo "PASS: No TS_USERSPACE=false references found"

      - name: Assert DATA_ROOT in volume paths (no bare ./ prefixes)
        run: |
          FAIL=0
          for f in $(find synology/services -name 'compose.yaml'); do
            # Check non-comment lines in volumes sections for bare ./ prefixes
            # Exclude lines that are pure comments (leading #)
            if grep -v '^\s*#' "$f" | grep -E '^\s*-\s*\./' ; then
              echo "FAIL: Bare ./ volume prefix found in $f (should use DATA_ROOT)"
              FAIL=1
            fi
          done

          if [ "$FAIL" -eq 1 ]; then
            exit 1
          fi
          echo "PASS: No bare ./ volume prefixes on non-comment lines"

      # ---------------------------------------------------------------
      # YAML linting
      # ---------------------------------------------------------------
      - name: Lint generated compose files with yamllint
        run: |
          yamllint -c .yamllint.yml synology/services/

      # ---------------------------------------------------------------
      # Idempotency check
      # ---------------------------------------------------------------
      - name: Idempotency check — re-run generator and diff
        run: |
          # Save a hash of the current output
          find synology/ -type f -exec md5sum {} \; | sort > /tmp/before.md5

          # Re-run the generator
          python tools/generate.py --all --portainer

          # Hash the output again
          find synology/ -type f -exec md5sum {} \; | sort > /tmp/after.md5

          # Compare
          if ! diff /tmp/before.md5 /tmp/after.md5; then
            echo "FAIL: Generator is not idempotent — output changed on re-run"
            diff /tmp/before.md5 /tmp/after.md5 || true
            exit 1
          fi
          echo "PASS: Generator output is idempotent"

  portainer-templates:
    name: Validate Portainer Templates
    runs-on: ubuntu-latest
    needs: generate-and-validate

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ruamel.yaml

      - name: Generate Portainer templates
        run: python tools/generate.py --all --portainer

      - name: Validate portainer-templates.json is valid JSON
        run: |
          python -m json.tool synology/portainer-templates.json > /dev/null
          echo "PASS: portainer-templates.json is valid JSON"

      - name: Validate template required fields
        run: |
          python3 -c "
          import json, sys

          with open('synology/portainer-templates.json') as f:
              data = json.load(f)

          templates = data if isinstance(data, list) else data.get('templates', data.get('version', data))

          # Handle Portainer v2 format: {version: '2', templates: [...]}
          if isinstance(data, dict) and 'templates' in data:
              templates = data['templates']

          if not isinstance(templates, list):
              print('FAIL: Could not find templates array in JSON')
              sys.exit(1)

          print(f'Found {len(templates)} templates')

          errors = []
          for i, t in enumerate(templates):
              name = t.get('title', f'template[{i}]')
              if 'type' not in t:
                  errors.append(f'{name}: missing \"type\"')
              if 'title' not in t:
                  errors.append(f'template[{i}]: missing \"title\"')
              repo = t.get('repository', {})
              if not repo.get('stackfile'):
                  errors.append(f'{name}: missing \"repository.stackfile\"')
              if 'env' not in t:
                  errors.append(f'{name}: missing \"env\"')

          if errors:
              print('FAIL: Template validation errors:')
              for e in errors:
                  print(f'  - {e}')
              sys.exit(1)

          print('PASS: All templates have required fields')
          "

      - name: Validate template count matches service count
        run: |
          python3 -c "
          import json, os, sys

          # Count service directories
          service_dirs = [
              d for d in os.listdir('synology/services')
              if os.path.isdir(os.path.join('synology/services', d))
          ]
          service_count = len(service_dirs)

          # Count templates
          with open('synology/portainer-templates.json') as f:
              data = json.load(f)

          if isinstance(data, dict) and 'templates' in data:
              templates = data['templates']
          elif isinstance(data, list):
              templates = data
          else:
              print('FAIL: Unexpected JSON structure')
              sys.exit(1)

          template_count = len(templates)

          print(f'Service directories: {service_count}')
          print(f'Portainer templates: {template_count}')

          if template_count != service_count:
              print(f'FAIL: Template count ({template_count}) does not match service count ({service_count})')
              sys.exit(1)

          print('PASS: Template count matches service directory count')
          "
